name: rust-endor

# Validates the Rust implementation of the endor daemon end-to-end:
# build XS from source via the c/moddable submodule, compile the
# endor binary, run slots unit tests, then run the JavaScript
# daemon test suite against the freshly-built binary.

on:
  push:
    branches: [slot-machine, slot-machine-pr, endor]
  pull_request:
    branches: [slot-machine, slot-machine-pr, endor, master]

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-endor:
    name: build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('rust/endo/**/Cargo.lock', 'rust/endo/**/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Enable corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 22.x
          cache: yarn

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Cargo test (slots unit tests)
        run: cargo test -p slots

      - name: Cargo test (endo lib)
        run: cargo test -p endo --lib

      - name: Build release endor binary
        run: cargo build --release --bin endor

      # Daemon integration tests are reported but not required: the
      # XS worker in packages/daemon currently lacks `makeBundle` and
      # `makeUnconfined` host functions, which cascades into ~150
      # failures unrelated to slot-machine.  Flip `continue-on-error`
      # to `false` once the XS worker implements those verbs.
      - name: Daemon integration tests against endor
        working-directory: packages/daemon
        continue-on-error: true
        env:
          ENDO_BIN: ../../target/release/endor
          ENDO_WORKER_BIN: ../../target/release/endor worker
        run: yarn ava --timeout=120s
